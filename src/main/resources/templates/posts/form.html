<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>新規投稿 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main>
    <h1 th:text="${formTitle}">新規投稿</h1>
    <nav class="nav">
        <a class="nav__link" th:href="@{/posts}">一覧に戻る</a>
        <a class="nav__link" th:if="${postId != null}" th:href="@{/posts/{id}(id=${postId})}">詳細に戻る</a>
    </nav>

    <form class="post-form" th:action="@{${formAction}}" th:object="${postForm}" method="post">
        <div class="form-field">
            <label for="author">投稿者</label>
            <input type="text" id="author" th:field="*{author}" maxlength="30" required>
            <p class="error" th:if="${#fields.hasErrors('author')}" th:errors="*{author}">エラー</p>
        </div>
        <div class="form-field">
            <label for="body">本文 (280 文字まで)</label>
            <textarea id="body"
                      th:field="*{body}"
                      maxlength="280"
                      rows="4"
                      required
                      data-forbidden-pattern="&lt;script"></textarea>
            <p class="error" th:if="${#fields.hasErrors('body')}" th:errors="*{body}">エラー</p>
        </div>
        <button id="postSubmit" type="submit" disabled th:text="${submitLabel}">投稿</button>
    </form>
    <script>
        (() => {
            const author = document.getElementById("author");
            const body = document.getElementById("body");
            const submit = document.getElementById("postSubmit");
            const scriptTagPattern = /<\s*\/?\s*script\b/i;
            const refreshSubmitState = () => {
                submit.disabled = !author.value.trim()
                    || !body.value.trim()
                    || scriptTagPattern.test(body.value);
            };

            author.addEventListener("input", refreshSubmitState);
            body.addEventListener("input", refreshSubmitState);
            refreshSubmitState();
        })();
    </script>
</main>
</body>
</html>
