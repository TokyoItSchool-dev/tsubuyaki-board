<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投稿詳細 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main>
    <h1>投稿詳細</h1>
    <nav class="post-detail-nav">
        <a th:href="@{/posts}">一覧に戻る</a>
    </nav>

    <article class="post-detail">
        <p class="post-detail__author author-line">
            <span>投稿者：</span>
            <span class="author-icon"
                  th:style="'background-color: ' + ${post.authorIconColor}"
                  th:text="${post.authorInitial}">投</span>
            <span th:text="${post.author}">投稿者</span>
        </p>
        <section class="post-detail__body-box">
            <p class="post-detail__body" th:text="${post.body}">本文</p>
        </section>
        <div class="post-detail__meta-row">
            <div class="post-detail__like-panel">
                <form class="post-detail__like-form" th:action="@{/posts/{id}/likes(id=${post.id})}" method="post">
                    <input type="hidden" name="returnTo" th:value="@{/posts/{id}(id=${post.id})}">
                    <button type="submit"
                            th:class="${post.liked} ? 'like-toggle like-toggle--liked' : 'like-toggle like-toggle--empty'"
                            aria-label="いいね切り替え">
                        <span class="like-heart" th:text="${post.liked} ? '♥' : '♡'">♡</span>
                        <span class="like-count" th:text="${post.likeCount}">0</span>
                    </button>
                </form>
            </div>
            <div class="post-detail__meta-actions">
                <time class="post-detail__created-at"
                      th:datetime="${post.createdAt}"
                      th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-23 09:00</time>
                <a class="post-detail__delete-link"
                   href="#"
                   onclick="if (confirm('削除します')) { document.getElementById('post-delete-form').requestSubmit(); } return false;">削除</a>
                <form class="post-detail__delete-form"
                      id="post-delete-form"
                      th:action="@{/posts/{id}/delete(id=${post.id})}"
                      method="post"
                      hidden></form>
            </div>
        </div>
    </article>
</main>
</body>
</html>
