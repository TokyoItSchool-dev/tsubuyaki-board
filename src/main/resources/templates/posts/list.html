<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投稿一覧 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main>
    <header class="timeline-header">
        <div class="timeline-header__title-row">
            <h1>社内つぶやきボード</h1>
            <p class="post-count" th:text="|投稿数：${postCount}件|">投稿数：0件</p>
        </div>
        <nav class="timeline-tabs" aria-label="投稿一覧ナビゲーション">
            <a class="timeline-tabs__link timeline-tabs__link--active" th:href="@{/posts}">一覧</a>
            <a class="timeline-tabs__link" th:href="@{/posts/new}">新規投稿</a>
        </nav>
        <div class="timeline-search">
            <form class="post-search" th:action="@{/posts}" method="get">
                <label class="visually-hidden" for="q">検索</label>
                <div class="post-search__field">
                    <span class="post-search__icon" aria-hidden="true">🔍</span>
                    <input class="post-search__input" type="search" id="q" name="q"
                           placeholder="キーワードを検索..." th:value="${keyword}">
                </div>
                <button class="post-search__button" type="submit">検索</button>
            </form>
            <form class="post-refresh" th:action="@{/posts/}" method="get">
                <button class="post-refresh__button" type="submit" title="更新" aria-label="更新">↺</button>
            </form>
        </div>
        <p class="search-result" th:if="${searchResultCount != null}">「<strong class="search-result__keyword"
                th:text="${keyword}">キーワード</strong>」の検索結果：<span th:text="${searchResultCount}">0</span>件</p>
    </header>

    <section>
        <p th:if="${#lists.isEmpty(posts)}">まだ投稿はありません。最初の一言を投稿しよう。</p>
        <article class="post post--list" th:each="post : ${posts}">
            <a class="post__link" th:href="@{/posts/{id}(id=${post.id})}">
                <div class="post__author-line">
                    <span class="post__avatar" th:classappend="|post__avatar--${post.avatarColor}|"></span>
                    <span class="post__author" th:text="${post.author}">投稿者</span>
                </div>
                <p class="post__body" th:text="${post.body}">本文</p>
                <div class="post__footer">
                    <div class="post__footer-meta">
                        <time class="post__created-at"
                              th:datetime="${post.createdAt}"
                              th:text="${@postTimeFormatter.format(post.createdAt)}">たった今</time>
                    </div>
                    <div class="post__footer-actions">
                        <span class="post__list-like-count">
                            <span class="post__like-heart">♥</span>
                            <span class="post__like-number" th:text="${likeCounts.get(post.id) ?: 0}">0</span>
                        </span>
                        <span class="post__list-comment-count">
                            <span class="post__comment-icon">💬</span>
                            <span class="post__comment-number" th:text="${commentCounts.get(post.id) ?: 0}">0</span>
                        </span>
                    </div>
                </div>
            </a>
        </article>
    </section>
</main>
</body>
</html>
