openapi: 3.0.0
info:
  title: Tsubuyaki Board API
  version: 1.0.0
paths:
  /api/posts:
    get:
      summary: 投稿一覧取得
      responses:
        "200":
          description: 投稿一覧
          content:
            application/json:
              schema:
                type: array
                maxItems: 50
                items:
                  type: object
                  required:
                    - id
                    - author
                    - body
                    - createdAt
                  properties:
                    id:
                      type: integer
                      format: int64
                    author:
                      type: string
                    body:
                      type: string
                    createdAt:
                      type: string
                      format: date-time
