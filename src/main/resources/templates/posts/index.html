<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投稿検索 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main>
    <h1>社内つぶやきボード</h1>
    <nav class="page-nav">
        <a th:href="@{/posts}">一覧</a>
        <a th:href="@{/posts/new}">新規投稿</a>
    </nav>

    <form class="search-form" th:action="@{/posts}" method="get">
        <label for="q">検索</label>
        <input type="search" id="q" name="q" th:value="${q}">
        <button type="submit">検索</button>
    </form>

    <form class="refresh-form" th:action="@{/posts/}" method="get">
        <button type="submit">更新</button>
    </form>

    <section aria-label="投稿一覧">
        <p class="empty-message" th:if="${#lists.isEmpty(posts)}">まだ投稿はありません</p>
        <article class="post" th:each="post : ${posts}">
            <p class="post__author" th:text="${post.author}">投稿者</p>
            <span class="post__avatar avatar-shape--person"
                  role="img"
                  aria-label="人型アバター"
                  th:classappend="| avatar-color--${post.avatarColor}|">
                <span class="post__avatar-head"></span>
                <span class="post__avatar-body"></span>
            </span>
            <span class="post__avatar-color" th:text="${post.avatarColor}">gray</span>
            <p class="post__body" th:text="${post.body}">本文</p>
            <time class="post__created-at"
                  th:datetime="${post.createdAt}"
                  th:text="${#temporals.format(post.createdAt.atZone(T(java.time.ZoneId).of('Asia/Tokyo')), 'yyyy-MM-dd HH:mm')}">
                2026-06-26 09:00
            </time>
        </article>
    </section>
</main>
</body>
</html>
