<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投稿一覧 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main>
    <h1>社内つぶやきボード</h1>
    <nav>
        <a th:href="@{/posts}">一覧</a>
        |
        <a th:href="@{/posts/new}">新規投稿</a>
    </nav>
    <form class="post-list__refresh" method="get" th:action="@{/posts/}">
        <button type="submit">更新</button>
    </form>
    <form class="post-list__search" method="get" th:action="@{/posts}">
        <input type="search" name="q" th:value="${q}" placeholder="本文を検索">
        <button type="submit">検索</button>
    </form>
    <p th:if="${tagName != null}" th:text="|#${tagName} の投稿|">#tag の投稿</p>

    <section>
        <p th:if="${#lists.isEmpty(posts)}">まだ投稿はありません</p>
        <article class="post" th:each="post : ${posts}">
            <p class="post__author"
               th:style="${#strings.isEmpty(post.avatarColor)} ? null : |color: ${post.avatarColor}|"
               th:text="${post.author}">投稿者</p>
            <p class="post__body" th:text="${post.body}">本文</p>
            <p class="post__tags" th:if="${post.hasTags()}">
                <a th:each="tag : ${post.tags}"
                   class="post__tag-link"
                   th:href="@{/tags/{name}(name=${tag.name})}"
                   th:text="|#${tag.name}|">#tag</a>
            </p>
            <time class="post__created-at"
                  th:datetime="${post.createdAt}"
                  th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-23 09:00</time>
            <a th:href="@{/posts/{id}(id=${post.id})}">詳細</a>
        </article>
    </section>
</main>
</body>
</html>
