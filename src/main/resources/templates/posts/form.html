<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>新規投稿 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css(v='logical-delete-1')}">
</head>
<body>
<main>
    <h1>新規投稿</h1>
    <nav>
        <a th:href="@{/posts}">一覧に戻る</a>
    </nav>

    <form th:action="@{/posts}" th:object="${postForm}" method="post">
        <div>
            <label for="author">投稿者</label>
            <input type="text" id="author" th:field="*{author}">
            <p class="error" th:if="${#fields.hasErrors('author')}" th:errors="*{author}">エラー</p>
        </div>
        <div>
            <label for="avatarColor">アバター色</label>
            <select id="avatarColor" th:field="*{avatarColor}">
                <option value="">未指定</option>
                <option value="red">赤</option>
                <option value="orange">オレンジ</option>
                <option value="yellow">黄</option>
                <option value="green">緑</option>
                <option value="blue">青</option>
                <option value="purple">紫</option>
                <option value="gray">グレー</option>
            </select>
        </div>
        <div>
            <label for="body">本文 (280 文字まで)</label>
            <textarea id="body" th:field="*{body}" rows="4"></textarea>
            <p class="error" th:if="${#fields.hasErrors('body')}" th:errors="*{body}">エラー</p>
        </div>
        <button type="submit">投稿</button>
    </form>
</main>
</body>
</html>
