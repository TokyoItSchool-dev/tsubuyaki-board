<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投稿詳細 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="app-shell">
    <header class="app-header">
        <div>
            <h1>社内つぶやきボード</h1>
            <p class="app-header__lead">投稿の内容と操作を確認できます。</p>
        </div>
        <nav class="app-nav" aria-label="投稿メニュー">
            <a class="app-nav__link" th:href="@{/posts}">一覧</a>
            <a class="app-nav__link app-nav__link--primary" th:href="@{/posts/new}">新規投稿</a>
        </nav>
    </header>

    <section class="page-section" aria-labelledby="detail-heading">
        <div class="page-title">
            <h2 id="detail-heading">投稿詳細</h2>
            <a class="button button--ghost" th:href="@{/posts}">一覧に戻る</a>
        </div>

        <p class="error" th:if="${detailError != null}" th:text="${detailError}">エラー</p>

        <article class="post post--detail" th:if="${post != null}" th:style="|background-color: ${post.backgroundColor};|">
            <header>
                <span class="post__author" th:text="${post.author}">投稿者</span>
            </header>
            <p class="post__body" th:text="${post.body}">本文</p>
            <time class="post__created-at"
                  th:datetime="${post.createdAt}"
                  th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-23 09:00</time>
            <p class="post__updated-at" th:if="${post.updatedAt != null}">
                編集済み:
                <time th:datetime="${post.updatedAt}"
                      th:text="${#temporals.format(post.updatedAt, 'yyyy-MM-dd HH:mm')}">2026-05-23 10:00</time>
            </p>
            <div class="post__actions">
                <span class="post__like-count" th:text="|いいね ${post.likeCount}|">いいね 0</span>
                <form class="post__like-form" method="post" th:action="@{/posts/{id}/likes(id=${post.id})}">
                    <input type="hidden" name="returnTo" value="detail">
                    <input type="hidden" th:if="${_csrf != null}"
                           th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="post__like-button" type="submit">いいね！</button>
                </form>
                <a class="post__edit-link button button--ghost" th:if="${post.canEdit}"
                   th:href="@{/posts/{id}/edit(id=${post.id})}">編集</a>
                <a class="post__delete-link button button--danger" th:if="${post.canDelete}"
                   th:href="@{/posts/{id}/delete-confirm(id=${post.id})}">削除</a>
            </div>
        </article>
    </section>
</main>
</body>
</html>
