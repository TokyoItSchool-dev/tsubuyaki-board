<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投稿一覧 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css(v='avatar-color-2')}">
</head>
<body>
<main>
    <h1>社内つぶやきボード</h1>
    <nav>
        <a th:href="@{/posts}">一覧</a>
        |
        <a th:href="@{/posts/new}">新規投稿</a>
    </nav>
    <form class="refresh-form" th:action="@{/posts/}" method="get">
        <button type="submit">更新</button>
    </form>
    <form class="search-form" th:action="@{/posts}" method="get">
        <label for="q">検索</label>
        <input type="search" id="q" name="q" th:value="${q}">
        <button type="submit">検索</button>
    </form>

    <section>
        <p th:if="${#lists.isEmpty(posts)}">まだ投稿はありません</p>
        <article class="post" th:each="post : ${posts}"
                 th:classappend="${#strings.isEmpty(post.avatarColor) ? '' : 'post--avatar-' + post.avatarColor}">
            <header>
                <a class="post__author"
                   th:href="@{/posts/{id}(id=${post.id})}"
                   th:text="${post.author}">投稿者</a>
            </header>
            <p class="post__body" th:text="${post.body}">本文</p>
            <time class="post__created-at"
                  th:datetime="${post.createdAt}"
                  th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-23 09:00</time>
        </article>
    </section>
</main>
</body>
</html>
