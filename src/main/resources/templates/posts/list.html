<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投稿一覧 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script th:src="@{/js/theme.js}" defer></script>
    <script th:src="@{/js/tags.js}" defer></script>
</head>
<body>
<main>
    <h1>社内つぶやきボード</h1>
    <button th:replace="~{fragments/common :: themeToggle}"></button>
    <nav th:replace="~{fragments/common :: mainNav}"></nav>

    <form class="search-form" th:action="@{/posts}" method="get">
        <label for="q">本文検索</label>
        <input id="q" type="search" name="q" th:value="${q}" placeholder="キーワード">
        <button type="submit">検索</button>
    </form>

    <section>
        <p th:if="${#lists.isEmpty(posts)}">まだ投稿はありません</p>
        <a class="post-link" th:each="post : ${posts}" th:href="@{/posts/{id}(id=${post.id})}">
            <article class="post">
                <div class="post__meta">
                    <p class="post__author">
                        <span class="post__author-color"
                              th:style="'background-color: ' + ${post.authorColor}"
                              aria-hidden="true"></span>
                        <span th:text="${post.author}">投稿者</span>
                    </p>
                    <time class="post__created-at"
                          th:datetime="${post.createdAt}"
                          th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-23 09:00</time>
                </div>
                <p class="post__body" th:text="${post.body}">本文</p>
                <div class="post__tags" data-tag-container aria-label="tags"></div>
            </article>
        </a>
    </section>
</main>
</body>
</html>
