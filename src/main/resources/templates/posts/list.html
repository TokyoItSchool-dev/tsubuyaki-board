<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投稿一覧 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main>
    <h1>社内つぶやきボード</h1>
    <div class="list-toolbar">
        <form class="new-post-form" th:action="@{/posts/form}" method="get">
            <button type="submit">新規投稿</button>
        </form>
        <form class="toolbar" th:action="@{/posts/}" method="get">
            <button type="submit">更新</button>
        </form>
        <form class="search-form" th:action="@{/posts}" method="get">
            <label for="q">本文検索</label>
            <input type="search" id="q" name="q" th:value="${q}" maxlength="280">
            <button type="submit">検索</button>
        </form>
    </div>

    <section>
        <p th:if="${#lists.isEmpty(posts)}">まだ投稿はありません</p>
        <article class="post" th:each="post : ${posts}">
            <header>
                <span class="post__author" th:text="${post.author}">投稿者</span>
                <span th:if="${!#strings.isEmpty(post.avatarColor)}"
                      th:class="'avatar-dot avatar-dot--' + ${post.avatarColor}"></span>
            </header>
            <p class="post__summary">
                <a class="post__body-link"
                   th:href="@{/posts/{id}(id=${post.id})}"
                   th:text="${#strings.length(post.body) > 40 ? #strings.substring(post.body, 0, 40) + '...' : post.body}">本文</a>
            </p>
            <time class="post__created-at"
                  th:datetime="${post.createdAt}"
                  th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-23 09:00</time>
            <p class="post__likes" th:text="${(likeCounts.get(post.id) ?: 0) + ' いいね'}">0 いいね</p>
        </article>
    </section>
</main>
</body>
</html>
