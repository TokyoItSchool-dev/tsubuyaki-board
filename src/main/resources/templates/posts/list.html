<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投稿一覧 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main>
    <h1>社内つぶやきボード</h1>
    <nav>
        <a th:href="@{/posts}">一覧</a>
        |
        <a th:href="@{/posts/new}">新規投稿</a>
    </nav>

    <section>
        <form class="toolbar" method="get" th:action="@{/posts}">
            <input type="text" name="q" th:value="${q}">
            <button type="submit">検索</button>
        </form>
        <p class="tag-heading" th:if="${tagName != null}" th:text="|タグ：${tagName}|">タグ：java</p>

        <p th:if="${#lists.isEmpty(posts)}">まだ投稿はありません</p>
        <article class="post" th:each="post : ${posts}">
            <header>
                <span class="post__author" th:text="${post.author}">投稿者</span>
                <span class="post__avatar-color"
                      th:classappend="| post__avatar-color--${post.avatarColor}|"
                      th:text="|● ${post.avatarColor}|">● blue</span>
            </header>
            <p class="post__body" th:text="${post.body}">本文</p>
            <time class="post__updated-at"
                  th:datetime="${post.updatedAt}"
                  th:text="${#temporals.format(post.updatedAt, 'yyyy-MM-dd HH:mm')}">2026-05-23 09:00</time>
            <p class="post__tags" th:if="${post.tags != null and !#lists.isEmpty(post.tags)}">
                <a th:each="tag : ${post.tags}"
                   th:href="@{/tags/{name}(name=${tag.name})}"
                   th:text="|#${tag.name}|">#java</a>
            </p>
            <form class="post__like-form"
                  method="post"
                  th:action="@{/posts/{id}/likes(id=${post.id})}">
                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">
                <input type="hidden" name="redirectTo" value="/posts">
                <button class="post__like-mark"
                        type="submit"
                        aria-label="いいねする"
                        th:text="|👍 ${post.id != null and likeCounts != null and likeCounts[post.id] != null
                            ? likeCounts[post.id] : 0}|"
                        title="いいね">👍 0</button>
            </form>
            <p>
                <a th:href="@{/posts/{id}(id=${post.id})}">詳細</a>
                |
                <a th:href="@{/posts/{id}/edit(id=${post.id})}">編集</a>
            </p>
        </article>
    </section>
</main>
</body>
</html>
