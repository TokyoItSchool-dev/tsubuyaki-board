<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投稿一覧 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css(v=20260701)}">
</head>
<body>
<main>
    <h1>社内つぶやきボード</h1>
    <nav>
        <a th:href="@{/posts}">一覧</a>
        |
        <a th:href="@{/posts/new}">新規投稿</a>
    </nav>
    <form class="toolbar" th:action="@{/posts}" method="get">
        <button type="submit">更新</button>
    </form>

    <section>
        <p th:if="${#lists.isEmpty(posts)}">まだ投稿はありません</p>
        <div class="posts-list" th:if="${!#lists.isEmpty(posts)}">
            <a class="post-item-link" th:each="post : ${posts}" th:href="@{/posts/{id}(id=${post.id})}">
                <article class="post-item">
                    <header class="post-item__header">
                        <span class="post-item__author" th:text="${post.author}">投稿者</span>
                        <time class="post-item__created-at"
                              th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-23 09:00</time>
                    </header>
                    <p class="post-item__body" th:text="${post.body}">本文</p>
                    <p class="post-item__likes"
                       th:text="|いいね ${likeCounts.get(post.id) ?: 0}|">いいね 0</p>
                </article>
            </a>
        </div>
    </section>
</main>
</body>
</html>
