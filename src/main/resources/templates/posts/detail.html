<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投稿詳細 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css(v='avatar-color-2')}">
</head>
<body>
<main>
    <h1>投稿詳細</h1>
    <nav>
        <a th:href="@{/posts}">一覧に戻る</a>
    </nav>

    <article class="post"
             th:classappend="${#strings.isEmpty(post.avatarColor) ? '' : 'post--avatar-' + post.avatarColor}">
        <header>
            <span class="post__author" th:text="${post.author}">投稿者</span>
        </header>
        <p class="post__body" th:text="${post.body}">本文</p>
        <time class="post__created-at"
              th:datetime="${post.createdAt}"
              th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-23 09:00</time>
        <p class="post__avatar-color"
           th:text="${#strings.isEmpty(post.avatarColor) ? 'アバター色 未指定' : 'アバター色 ' + post.avatarColor}">
            アバター色 blue
        </p>
        <p class="post__likes" th:text="|いいね ${likeCount}|">いいね 0</p>
        <form th:action="@{/posts/{id}/likes(id=${postId})}" method="post">
            <input type="hidden" th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit">like</button>
        </form>
    </article>
</main>
</body>
</html>
