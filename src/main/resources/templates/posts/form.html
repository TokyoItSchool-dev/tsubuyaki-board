<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>新規投稿 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main>
    <h1>新規投稿</h1>
    <nav>
        <a th:href="@{/posts}">一覧に戻る</a>
    </nav>

    <form th:action="@{/posts}" th:object="${postForm}" method="post">
        <div>
            <label for="author">投稿者</label>
            <input type="text" id="author" th:field="*{author}" maxlength="30" required>
            <p class="error" th:if="${#fields.hasErrors('author')}" th:errors="*{author}">エラー</p>
        </div>
        <div>
            <label for="body">本文 (280 文字まで)</label>
            <textarea id="body" th:field="*{body}" maxlength="280" rows="4" required></textarea>
            <p class="error" th:if="${#fields.hasErrors('body')}" th:errors="*{body}">エラー</p>
        </div>
        <div>
            <span id="avatarColorLabel">アバター色</span>
            <div class="avatar-color-options" role="radiogroup" aria-labelledby="avatarColorLabel">
                <label class="avatar-color-option">
                    <input type="radio" th:field="*{avatarColor}" value="#ff0000">
                    <span class="avatar-color-option__swatch avatar-color-option__swatch--red" aria-hidden="true"></span>
                    <span class="visually-hidden">赤</span>
                </label>
                <label class="avatar-color-option">
                    <input type="radio" th:field="*{avatarColor}" value="#0000ff">
                    <span class="avatar-color-option__swatch avatar-color-option__swatch--blue" aria-hidden="true"></span>
                    <span class="visually-hidden">青</span>
                </label>
                <label class="avatar-color-option">
                    <input type="radio" th:field="*{avatarColor}" value="#008000">
                    <span class="avatar-color-option__swatch avatar-color-option__swatch--green" aria-hidden="true"></span>
                    <span class="visually-hidden">緑</span>
                </label>
                <label class="avatar-color-option">
                    <input type="radio" th:field="*{avatarColor}" value="#ffff00">
                    <span class="avatar-color-option__swatch avatar-color-option__swatch--yellow" aria-hidden="true"></span>
                    <span class="visually-hidden">黄色</span>
                </label>
                <label class="avatar-color-option">
                    <input type="radio" th:field="*{avatarColor}" value="#ffffff">
                    <span class="avatar-color-option__swatch avatar-color-option__swatch--white" aria-hidden="true"></span>
                    <span class="visually-hidden">白</span>
                </label>
            </div>
            <p class="error" th:if="${#fields.hasErrors('avatarColor')}" th:errors="*{avatarColor}">エラー</p>
        </div>
        <button type="submit">投稿</button>
    </form>
</main>
</body>
</html>
