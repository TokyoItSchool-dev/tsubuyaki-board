<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投稿一覧 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main id="top">
    <header class="page-header">
        <div>
            <p class="page-header__eyebrow">Internal board</p>
            <h1>社内つぶやきボード</h1>
        </div>
    </header>

    <nav class="nav">
        <a class="nav__link" th:href="@{/posts}">一覧</a>
        <a class="nav__link" th:href="@{/posts/new}">新規投稿</a>
        <a class="nav__link" th:href="@{/posts/trash}">ごみ箱</a>
    </nav>

    <div class="toolbar">
        <form class="search-form" th:action="@{/posts}" method="get">
            <label class="search-form__label" for="searchQuery">本文検索</label>
            <input id="searchQuery"
                   name="q"
                   type="search"
                   th:value="${searchQuery}"
                   autocomplete="off"
                   placeholder="キーワード">
            <button id="searchSubmit" type="submit" disabled>検索</button>
        </form>

        <form th:action="@{/posts/}" method="get">
            <button type="submit">更新</button>
        </form>
    </div>

    <div class="board-layout">
        <aside class="notice-panel" aria-label="お知らせ">
            <h2>お知らせ</h2>
            <p th:if="${editedPostId != null}" th:text="|ID${editedPostId}が編集されました。|">ID10が編集されました。</p>
            <p th:if="${deletedPostId != null}" th:text="|ID${deletedPostId}が削除されました。|">ID11が削除されました。</p>
            <p th:if="${editedPostId == null and deletedPostId == null}">お知らせはありません。</p>
        </aside>

        <section class="posts">
            <p class="empty-message" th:if="${#lists.isEmpty(posts)}">まだ投稿はありません。最初の一言を投稿しよう。</p>
            <article class="post" th:each="post : ${posts}">
                <a class="post__id" th:href="@{/posts/{id}(id=${post.id})}" th:text="|ID ${post.id}|">ID 1</a>
                <div class="post__meta">
                    <div class="post__author" th:text="${post.author}">投稿者</div>
                    <img class="post__avatar"
                         th:if="${post.hasAvatarImage()}"
                         th:src="${post.avatarImageDataUri}"
                         alt="">
                    <span class="post__avatar"
                          th:unless="${post.hasAvatarImage()}"
                          th:style="|background-color: ${post.avatarColor == null ? '#d6dde6' : post.avatarColor}|"
                          aria-hidden="true"></span>
                </div>
                <p class="post__body"
                   th:classappend="${#strings.length(post.body) > 100 ? 'post__body--truncated' : ''}"
                   th:attr="data-tooltip=${#strings.length(post.body) > 100 ? post.body : null},
                            title=${#strings.length(post.body) > 100 ? post.body : null},
                            tabindex=${#strings.length(post.body) > 100 ? '0' : null}"
                   th:text="${#strings.length(post.body) > 100
                       ? #strings.substring(post.body, 0, 100) + '....'
                       : post.body}">本文</p>
                <time class="post__created-at"
                      th:datetime="${post.createdAt}"
                      th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-23 09:00</time>
            </article>
        </section>
    </div>

    <nav class="pagination" th:if="${totalPages > 1}" aria-label="ページ遷移">
        <a class="pagination__link"
           th:if="${hasPrevious}"
           th:href="${#strings.isEmpty(searchQuery)
               ? '/posts/?page=' + (currentPage - 1)
               : '/posts/?page=' + (currentPage - 1) + '&q=' + searchQuery}">前へ</a>
        <a class="pagination__link"
           th:each="pageNumber : ${pageNumbers}"
           th:classappend="${pageNumber == currentPage ? 'pagination__link--current' : ''}"
           th:href="${#strings.isEmpty(searchQuery)
               ? '/posts/?page=' + pageNumber
               : '/posts/?page=' + pageNumber + '&q=' + searchQuery}"
           th:text="${pageNumber + 1}">1</a>
        <a class="pagination__link"
           th:if="${hasNext}"
           th:href="${#strings.isEmpty(searchQuery)
               ? '/posts/?page=' + (currentPage + 1)
               : '/posts/?page=' + (currentPage + 1) + '&q=' + searchQuery}">次へ</a>
    </nav>

    <a class="back-to-top" href="#top" aria-label="TOPへ戻る">TOP</a>
</main>
<script>
    (() => {
        const searchQuery = document.getElementById("searchQuery");
        const searchSubmit = document.getElementById("searchSubmit");
        const unsafeSearchPattern = /[<>]/;
        const refreshSearchSubmitState = () => {
            searchSubmit.disabled = !searchQuery.value.trim()
                || unsafeSearchPattern.test(searchQuery.value);
        };

        searchQuery.addEventListener("input", refreshSearchSubmitState);
        refreshSearchSubmitState();
    })();
</script>
</body>
</html>
