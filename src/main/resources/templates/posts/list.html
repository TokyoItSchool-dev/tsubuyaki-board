<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投稿一覧 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main>
    <h1 th:if="${tagName == null}">社内つぶやきボード</h1>
    <h1 th:if="${tagName != null}" th:text="|タグ #${tagName}|">タグ #java</h1>
    <nav>
        <a th:href="@{/posts}">一覧</a>
        |
        <a th:href="@{/posts/new}">新規投稿</a>
    </nav>

    <form class="search-form" th:action="@{/posts}" method="get">
        <label for="q">キーワード検索</label>
        <input type="search" id="q" name="q" th:value="${q}" maxlength="280">
        <button type="submit">検索</button>
    </form>

    <section>
        <p th:if="${#lists.isEmpty(posts)}">まだ投稿はありません</p>
        <article class="post" th:each="post : ${posts}">
            <header>
                <span class="post__avatar"
                      th:classappend="|post__avatar--${post.avatarColor}|"
                      th:attr="aria-label=|アバター色 ${post.avatarColor}|"></span>
                <span>
                    <span class="post__author" th:text="${post.author}">投稿者</span>
                    <span class="post__created-at"
                          th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-23 09:00</span>
                </span>
            </header>
            <p class="post__body" th:text="${post.body}">本文</p>
            <p class="post__tags" th:if="${!#sets.isEmpty(post.tags)}">
                <a th:each="tag : ${post.tags}"
                   th:href="@{/tags/{name}(name=${tag.name})}"
                   th:text="|#${tag.name}|">#tag</a>
            </p>
            <p><a th:href="@{/posts/{id}(id=${post.id})}">詳細を見る</a></p>
        </article>
    </section>
</main>
</body>
</html>
