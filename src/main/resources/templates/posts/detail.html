<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投稿詳細 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main>
    <h1>投稿詳細</h1>
    <nav>
        <a th:href="@{/posts}">一覧に戻る</a>
    </nav>

    <article class="post post--detail">
        <p class="post__author">
            <span class="avatar"
                  th:classappend="|avatar--${post.avatarColor}|"
                  aria-hidden="true"></span>
            <span th:text="${post.author}">投稿者</span>
        </p>
        <div class="post__reply-authors" th:if="${!#lists.isEmpty(replies)}">
            <p class="post__reply-author"
               th:each="replyItem : ${replies}"
               th:style="|--reply-depth: ${replyItem.depth}|"
               th:text="|↳${replyItem.reply.author}|">↳返信者</p>
        </div>
        <p class="post__body" th:text="${post.body}">本文</p>
        <time class="post__created-at"
              th:datetime="${post.createdAt}"
              th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-23 09:00</time>
        <div class="post__actions">
            <span class="post__likes" th:text="|いいね ${likeCount}|">いいね 0</span>
            <form class="post__like-form" th:action="@{/posts/{id}/likes(id=${post.id})}" method="post">
                <input th:if="${_csrf != null}" type="hidden"
                       th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="post__good-button"
                        th:classappend="${liked} ? 'post__good-button--active' : ''"
                        type="submit"
                        th:attr="aria-pressed=${liked},aria-label=${liked} ? 'いいねを取り消す' : 'いいね'"
                        th:text="'👍'">👍</button>
            </form>
            <form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post">
                <input th:if="${_csrf != null}" type="hidden"
                       th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit">削除</button>
            </form>
        </div>
    </article>

    <section class="reply-panel" aria-label="返信">
        <form class="reply-form" th:action="@{/posts/{id}/replies(id=${post.id})}" th:object="${replyForm}" method="post">
            <input th:if="${_csrf != null}" type="hidden"
                   th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="reply-form__fields">
                <label>
                    <span>ユーザー名</span>
                    <input type="text" th:field="*{author}" maxlength="15" required>
                </label>
                <p th:if="${#fields.hasErrors('author')}" th:errors="*{author}">ユーザー名エラー</p>
                <label>
                    <span>コメント</span>
                    <textarea th:field="*{body}" maxlength="1000" required></textarea>
                </label>
                <p th:if="${#fields.hasErrors('body')}" th:errors="*{body}">コメントエラー</p>
            </div>
            <div class="reply-form__actions">
                <button type="submit">返信</button>
            </div>
        </form>

        <div class="reply-tree">
            <p th:if="${#lists.isEmpty(replies)}">まだ返信はありません</p>
            <article class="reply"
                     th:each="replyItem : ${replies}"
                     th:style="|--reply-depth: ${replyItem.depth}|">
                <p class="reply__author">
                    <span th:text="|↳${replyItem.reply.author}|">↳返信者</span>
                </p>
                <p class="reply__body" th:text="${replyItem.reply.body}">返信本文</p>
                <time class="reply__created-at"
                      th:datetime="${replyItem.reply.createdAt}"
                      th:text="${#temporals.format(replyItem.reply.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-23 09:01</time>
                <form class="reply__read-form"
                      th:action="@{/posts/{postId}/replies/{replyId}/read(postId=${post.id},replyId=${replyItem.reply.id})}"
                      method="post">
                    <input th:if="${_csrf != null}" type="hidden"
                           th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <label>
                        <input type="checkbox"
                               name="read"
                               th:checked="${replyItem.reply.read}"
                               onchange="this.form.submit()">
                        <span>既読</span>
                    </label>
                </form>
                <form class="reply-form reply-form--child"
                      th:action="@{/posts/{id}/replies(id=${post.id})}"
                      method="post">
                    <input th:if="${_csrf != null}" type="hidden"
                           th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="parentReplyId" th:value="${replyItem.reply.id}">
                    <div class="reply-form__fields">
                        <label>
                            <span>ユーザー名</span>
                            <input type="text" name="author" maxlength="15" required>
                        </label>
                        <label>
                            <span>コメント</span>
                            <textarea name="body" maxlength="1000" required></textarea>
                        </label>
                    </div>
                    <div class="reply-form__actions">
                        <button type="submit">返信</button>
                    </div>
                </form>
            </article>
        </div>
    </section>
</main>
<script defer th:src="@{/js/falling-leaves.js}"></script>
</body>
</html>
