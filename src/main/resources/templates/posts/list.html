<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投稿一覧 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main>
    <h1>社内つぶやきボード</h1>
    <nav>
        <a th:href="@{/posts}">一覧</a>
        |
        <a th:href="@{/posts/new}">新規投稿</a>
    </nav>
    <form class="toolbar toolbar--search" th:action="@{/posts}" method="get">
        <label class="toolbar__label" for="post-search">本文検索</label>
        <input id="post-search"
               class="toolbar__query"
               type="search"
               name="q"
               th:value="${q}"
               maxlength="280">
        <button type="submit">検索</button>
        <a th:href="@{/posts}">クリア</a>
    </form>

    <section>
        <p th:if="${#lists.isEmpty(posts)}">まだ投稿はありません</p>
        <article class="post" th:each="post : ${posts}">
            <p class="post__author" th:text="${post.author}">投稿者</p>
            <p class="post__body" th:text="${post.body}">本文</p>
            <time class="post__created-at"
                  th:datetime="${post.createdAt}"
                  th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-23 09:00</time>
            <p class="post__actions">
                <a th:href="@{/posts/{id}(id=${post.id})}">詳細</a>
            </p>
        </article>
    </section>
</main>
</body>
</html>
