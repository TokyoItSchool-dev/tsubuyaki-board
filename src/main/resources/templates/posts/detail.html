<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投稿詳細 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main>
    <h1>投稿詳細</h1>
    <nav>
        <a th:href="@{/posts}">一覧に戻る</a>
    </nav>

    <article class="post">
        <div class="post__author">
            <span class="post__avatar" th:style="'background-color: ' + ${post.avatarColor}" th:text="${#strings.toUpperCase(#strings.substring(post.author, 0, 1))}">A</span>
            <span class="post__author-name" th:text="${post.author}">投稿者</span>
        </div>
        <p class="post__body" th:text="${post.body}">本文</p>
        <form class="post__like-form" th:action="@{/posts/{id}/likes(id=${post.id})}" method="post">
            <input th:if="${_csrf != null}"
                   type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">
            <button class="post__like-button" type="submit" aria-label="いいねする">
                <span class="post__like-heart" aria-hidden="true">♥</span>
                <span class="post__like-count" th:text="${likeCount}">0</span>
                <span class="post__like-label">いいね</span>
            </button>
        </form>
        <time class="post__created-at"
              th:datetime="${post.createdAt}"
              th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-23 09:00</time>
    </article>
</main>
</body>
</html>
