<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投稿一覧 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="app-shell">
    <header class="app-header">
        <div>
            <h1>社内つぶやきボード</h1>
            <p class="app-header__lead">短い共有を、読みやすいタイムラインで確認できます。</p>
        </div>
        <nav class="app-nav" aria-label="投稿メニュー">
            <a class="app-nav__link" th:href="@{/posts}">一覧</a>
            <a class="app-nav__link app-nav__link--primary" th:href="@{/posts/new}">新規投稿</a>
        </nav>
    </header>

    <div class="timeline-layout">
        <section class="composer-card" aria-label="投稿操作">
            <div>
                <h2 class="composer-card__title">いま共有したいことを書く</h2>
                <p class="composer-card__body">気づきや進捗を短く投稿できます。</p>
            </div>
            <a class="button button--primary" th:href="@{/posts/new}">新規投稿</a>
        </section>

        <section class="timeline-toolbar" aria-label="投稿一覧の操作">
            <form class="post-list__refresh" method="get" th:action="@{/posts}">
                <button class="button button--secondary" type="submit">更新</button>
            </form>
            <form class="post-search" method="get" th:action="@{/posts}">
                <input class="post-search__input" type="search" name="q" th:value="${query}" placeholder="本文を検索">
                <button class="post-search__button button button--secondary" type="submit">検索</button>
            </form>
            <div class="search-status" th:if="${searched}">
                <span>検索: <strong th:text="${query}">検索語</strong></span>
                <a class="button button--ghost" th:href="@{/posts}">検索を解除</a>
            </div>
        </section>

        <section class="timeline-feed" aria-label="投稿一覧">
            <p class="empty-state" th:if="${#lists.isEmpty(posts) and !searched}">まだ投稿はありません。</p>
            <p class="empty-state" th:if="${#lists.isEmpty(posts) and searched}">条件に一致する結果が見つかりませんでした。</p>
            <article class="post post-card" th:each="post : ${posts}" th:style="|background-color: ${post.backgroundColor};|">
                <header class="post__header">
                    <a class="post__author" th:href="@{/posts/{id}(id=${post.id})}" th:text="${post.author}">投稿者</a>
                </header>
                <p class="post__body" th:text="${post.body}">本文</p>
                <time class="post__created-at"
                      th:datetime="${post.createdAt}"
                      th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-23 09:00</time>
                <p class="post__updated-at" th:if="${post.updatedAt != null}">
                    編集済み:
                    <time th:datetime="${post.updatedAt}"
                          th:text="${#temporals.format(post.updatedAt, 'yyyy-MM-dd HH:mm')}">2026-05-23 10:00</time>
                </p>
                <div class="post__actions">
                    <span class="post__like-count" th:text="|いいね ${post.likeCount}|">いいね 0</span>
                    <form class="post__like-form" method="post" th:action="@{/posts/{id}/likes(id=${post.id})}">
                        <input type="hidden" name="returnTo" value="list">
                        <input type="hidden" th:if="${_csrf != null}"
                               th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="post__like-button" type="submit">いいね！</button>
                    </form>
                    <a class="post__detail-link button button--ghost"
                       th:href="@{/posts/{id}(id=${post.id})}">詳細を見る</a>
                </div>
            </article>
        </section>
    </div>
</main>
</body>
</html>
