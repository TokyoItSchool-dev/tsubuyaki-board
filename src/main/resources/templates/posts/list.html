<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投稿一覧 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main>
    <h1>社内つぶやきボード</h1>
    <nav>
        <a th:href="@{/posts}">一覧</a>
        |
        <a th:href="@{/posts/new}">新規投稿</a>
    </nav>
    <form class="search-box" th:action="@{/posts}" method="get">
        <input class="search-box__input"
               type="search"
               name="q"
               th:value="${query}"
               placeholder="キーワードを入力"
               aria-label="キーワード検索">
        <button class="search-box__button" type="submit">検索</button>
    </form>
    <form class="toolbar" th:action="@{/posts/}" method="get">
        <button type="submit">更新</button>
    </form>

    <section>
        <p class="search-result-count" th:if="${searchExecuted}"
           th:text="|検索結果：${searchResultCount}件|">検索結果：0件</p>
        <p th:if="${!searchExecuted and #lists.isEmpty(posts)}">まだ投稿はありません</p>
        <article class="post post--link" th:each="post : ${posts}">
            <a class="post__main-link" th:href="@{/posts/{id}(id=${post.id})}">
                <p class="post__author" th:text="${post.author}">投稿者</p>
                <p class="post__body" th:text="${post.body}">本文</p>
                <time class="post__created-at"
                      th:datetime="${post.createdAt}"
                      th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-23 09:00</time>
            </a>
            <form class="post__like-form" th:action="@{/posts/{id}/likes(id=${post.id})}" method="post">
                <input type="hidden" name="returnTo" value="/posts">
                <button type="submit"
                        th:class="${post.liked} ? 'like-toggle like-toggle--liked' : 'like-toggle like-toggle--empty'"
                        aria-label="いいね切り替え">
                    <span class="like-heart" th:text="${post.liked} ? '♥' : '♡'">♡</span>
                </button>
            </form>
        </article>
    </section>
</main>
</body>
</html>
