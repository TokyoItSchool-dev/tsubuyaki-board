<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>新規投稿 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="app-shell">
    <header class="app-header">
        <div>
            <h1>社内つぶやきボード</h1>
            <p class="app-header__lead">短い共有を投稿できます。</p>
        </div>
        <nav class="app-nav" aria-label="投稿メニュー">
            <a class="app-nav__link" th:href="@{/posts}">一覧</a>
            <a class="app-nav__link app-nav__link--primary" th:href="@{/posts/new}">新規投稿</a>
        </nav>
    </header>

    <section class="page-section" aria-labelledby="form-heading">
        <div class="page-title">
            <h2 id="form-heading">新規投稿</h2>
            <a class="button button--ghost" th:href="@{/posts}">一覧に戻る</a>
        </div>

        <form class="post-form" th:action="@{/posts}" th:object="${postForm}" method="post">
            <div class="post-form__field">
                <label class="required-label" for="author">投稿者</label>
                <p id="author-help" class="form-help">投稿者名は必須・30文字以内です。</p>
                <input type="text" id="author" th:field="*{author}" maxlength="30" required
                       aria-describedby="author-help author-error">
                <p id="author-error" class="error" th:if="${#fields.hasErrors('author')}"
                   th:errors="*{author}">エラー</p>
            </div>
            <div class="post-form__field">
                <label class="required-label" for="body">本文</label>
                <p id="body-help" class="form-help">本文は必須・280文字以内です。</p>
                <textarea id="body" th:field="*{body}" maxlength="280" rows="4" required
                          aria-describedby="body-help body-error"></textarea>
                <p id="body-error" class="error" th:if="${#fields.hasErrors('body')}"
                   th:errors="*{body}">エラー</p>
            </div>
            <fieldset class="color-palette">
                <legend>背景色</legend>
                <label class="color-palette__item" th:each="color : ${postForm.backgroundColors}">
                    <input class="color-palette__input" type="radio" th:field="*{backgroundColor}" th:value="${color}">
                    <span class="color-palette__swatch" th:style="|background-color: ${color};|"></span>
                </label>
            </fieldset>
            <div class="form-actions">
                <button class="button button--primary" type="submit">投稿</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
