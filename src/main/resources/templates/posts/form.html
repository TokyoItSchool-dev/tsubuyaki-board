<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>新規投稿 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main>
    <h1>新規投稿</h1>
    <nav>
        <a th:href="@{/posts}">一覧に戻る</a>
    </nav>

    <form class="post-form" th:action="@{/posts}" th:object="${postForm}" method="post">
        <div class="post-form__field">
            <label class="post-form__label" for="author">投稿者</label>
            <input class="post-form__input" type="text" id="author" th:field="*{author}">
            <p class="error" th:if="${#fields.hasErrors('author')}" th:errors="*{author}">エラー</p>
        </div>
        <fieldset class="post-form__fieldset">
            <legend class="post-form__label">アバター色</legend>
            <div class="post-form__choices">
            <label class="post-form__choice">
                <input type="radio" th:field="*{avatarColor}" value="">
                指定なし
            </label>
            <label class="post-form__choice">
                <input type="radio" th:field="*{avatarColor}" value="blue">
                青
            </label>
            <label class="post-form__choice">
                <input type="radio" th:field="*{avatarColor}" value="green">
                緑
            </label>
            <label class="post-form__choice">
                <input type="radio" th:field="*{avatarColor}" value="pink">
                ピンク
            </label>
            </div>
        </fieldset>
        <div class="post-form__field">
            <label class="post-form__label" for="body">本文</label>
            <textarea class="post-form__textarea" id="body" th:field="*{body}" rows="6"></textarea>
            <p class="error" th:if="${#fields.hasErrors('body')}" th:errors="*{body}">エラー</p>
        </div>
        <div class="post-form__field">
            <label class="post-form__label" for="tagNames">タグ</label>
            <input class="post-form__input" type="text" id="tagNames" th:field="*{tagNames}">
        </div>
        <div class="post-form__actions">
            <button class="post-form__submit" type="submit">投稿</button>
        </div>
    </form>
</main>
</body>
</html>
