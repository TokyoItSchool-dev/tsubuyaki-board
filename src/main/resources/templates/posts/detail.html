<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投稿詳細 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main>
    <h1>投稿詳細</h1>
    <nav>
        <a th:href="@{/posts}">一覧に戻る</a>
        |
        <a th:href="@{/posts/new}">新規投稿</a>
    </nav>

    <article class="post">
        <header>
            <span class="post__avatar"
                  th:classappend="|post__avatar--${post.avatarColor}|"
                  th:attr="aria-label=|アバター色 ${post.avatarColor}|"></span>
            <span>
                <span class="post__author" th:text="${post.author}">投稿者</span>
                <span class="post__created-at"
                      th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-23 09:00</span>
            </span>
        </header>
        <p class="post__body" th:text="${post.body}">本文</p>
        <p class="post__tags" th:if="${!#sets.isEmpty(post.tags)}">
            <a th:each="tag : ${post.tags}"
               th:href="@{/tags/{name}(name=${tag.name})}"
               th:text="|#${tag.name}|">#tag</a>
        </p>
        <footer class="post__actions">
            <span class="post__likes" th:text="|いいね ${likeCount}|">いいね 0</span>
            <form th:action="@{/posts/{id}/likes(id=${post.id})}" method="post">
                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">
                <button type="submit">Like</button>
            </form>
            <form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post">
                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">
                <button type="submit">削除</button>
            </form>
        </footer>
    </article>
</main>
</body>
</html>
