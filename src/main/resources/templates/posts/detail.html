<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投稿詳細 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main>
    <h1>投稿詳細</h1>
    <nav>
        <a th:href="@{/posts}">一覧に戻る</a>
    </nav>

    <article class="post">
        <p class="post__author" th:text="${post.author}">投稿者</p>
        <p class="post__body" th:text="${post.body}">本文</p>
        <p class="post__likes" th:text="|いいね ${post.likeCount}|">いいね 0</p>
        <form th:action="@{/posts/{id}/likes(id=${post.id})}" method="post">
            <button type="submit"
                    class="like-button"
                    th:classappend="${post.likedByCurrentClient} ? ' like-button--liked' : ''"
                    th:attr="aria-pressed=${post.likedByCurrentClient}"
                    th:text="${post.likedByCurrentClient} ? 'Liked（解除）' : 'Like'">Like</button>
        </form>
        <time class="post__created-at"
              th:datetime="${post.createdAt}"
              th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-23 09:00</time>
    </article>
</main>
</body>
</html>
