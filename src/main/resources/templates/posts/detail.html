<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投稿詳細 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css(v=20260701)}">
</head>
<body>
<main>
    <h1>投稿詳細</h1>
    <nav>
        <a th:href="@{/posts}">一覧に戻る</a>
    </nav>

    <article class="post post-detail" th:style="|background-color: #${post.color}|">
        <header class="post__header">
            <span class="post__author" th:text="${post.author}">投稿者</span>
            <time class="post__created-at"
                  th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-23 09:00</time>
        </header>
        <p class="post__body"><span th:each="segment : ${bodySegments}" th:class="${segment.tag} ? 'post-tag-inline' : null" th:text="${segment.text}">本文</span></p>
    </article>
    <div class="like-action">
        <p class="like-count" th:text="|いいね ${likeCount}|">いいね 0</p>
        <form th:action="@{/posts/{id}/likes(id=${post.id})}" method="post">
            <button type="submit">いいね</button>
        </form>
        <form th:if="${canDelete}" th:action="@{/posts/{id}/delete(id=${post.id})}" method="post">
            <button type="submit">削除</button>
        </form>
    </div>
</main>
</body>
</html>
