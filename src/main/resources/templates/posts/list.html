<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投稿一覧 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main>
    <h1>社内つぶやきボード</h1>
    <nav>
        <a th:href="@{/posts}">一覧</a>
        |
        <form th:action="@{/posts/new}" method="get">
            <button type="submit">投稿</button>
        </form>
    </nav>

    <section>
        <div class="toolbar">
            <form th:action="@{/posts/}" method="get">
                <button type="submit">更新</button>
            </form>
        </div>

        <p th:if="${#lists.isEmpty(posts)}">まだ投稿はありません</p>
        <a class="post__link" th:each="post : ${posts}" th:href="@{/posts/{id}(id=${post.id})}">
            <article class="post">
                <p class="post__author" th:text="${post.author}">投稿者</p>
                <p class="post__body" th:text="${post.body}">本文</p>
                <p class="post__likes" th:text="|いいね ${post.likeCount}|">いいね 0</p>
                <time class="post__created-at"
                      th:datetime="${post.createdAt}"
                      th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-23 09:00</time>
            </article>
        </a>
    </section>
</main>
</body>
</html>
