<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投稿詳細 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main>
    <h1>投稿詳細</h1>
    <nav>
        <a th:href="@{/posts}">一覧に戻る</a>
    </nav>

    <article class="post">
        <div class="post__author">
            <span class="post__label">投稿者</span>
            <span th:text="${post.author}">投稿者</span>
        </div>
        <p class="post__body" th:text="${post.body}">本文</p>
        <div class="post__created-at">
            <span class="post__label">投稿日</span>
            <time th:datetime="${post.createdAt}"
                  th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-23 09:00</time>
        </div>
    </article>
</main>
</body>
</html>
