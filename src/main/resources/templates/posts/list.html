<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投稿一覧 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main>
    <h1>社内つぶやきボード</h1>
    <nav>
        <a th:href="@{/posts}">一覧</a>
        |
        <a th:href="@{/posts/new}">新規投稿</a>
    </nav>

    <section>
        <form class="toolbar" th:action="@{/posts}" method="get">
            <button type="submit">更新</button>
        </form>

        <p class="empty-message" th:if="${#lists.isEmpty(posts)}">まだ投稿はありません</p>
        <a class="post post--link" th:each="post : ${posts}" th:href="@{/posts/{id}(id=${post.id})}">
            <p class="post__author" th:text="${post.author}">投稿者</p>
            <p class="post__body" th:text="${post.body}">本文</p>
            <time class="post__created-at"
                  th:datetime="${post.createdAt}"
                  th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-23 09:00</time>
        </a>
    </section>
</main>
</body>
</html>
