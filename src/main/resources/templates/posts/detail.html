<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投稿詳細 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="post-detail-page">
    <header class="page-header page-header--detail">
        <nav class="post-detail-nav">
            <a class="post-detail-nav__back" th:href="@{/posts}">一覧に戻る</a>
        </nav>
        <h1>投稿詳細</h1>
    </header>

    <article class="post post--detail">
        <div class="post__author-line">
            <span class="post__avatar" th:classappend="|post__avatar--${post.avatarColor}|"></span>
            <span class="post__author" th:text="${post.author}">投稿者</span>
        </div>
        <p class="post__body" th:text="${post.body}">本文</p>
        <div class="post__actions">
            <div class="post__actions-meta">
                <time class="post__created-at"
                      th:datetime="${post.createdAt}"
                      th:text="${@postTimeFormatter.format(post.createdAt)}">たった今</time>
            </div>
            <div class="post__actions-buttons">
                <form class="post__like-form post__actions-like" th:action="@{/posts/{id}/likes(id=${post.id})}" method="post">
                    <button class="post__like-button" type="submit">
                        <span class="post__like-heart" th:text="${liked ? '♥' : '♡'}">♡</span>
                        <span class="post__like-number" th:text="${likeCount}">0</span>
                    </button>
                </form>
                <form class="post__delete-form post__actions-delete" th:action="@{/posts/{id}/delete(id=${post.id})}" method="post">
                    <button class="post__delete-button" type="submit">🗑 削除</button>
                </form>
            </div>
        </div>
    </article>

    <section class="comments comments--detail">
        <h2 class="comments__title" th:text="|💬 コメント（${#lists.size(comments)}）|">💬 コメント（0）</h2>
        <div class="comments__list">
            <article class="comment" th:each="comment : ${comments}">
                <div class="comment__header">
                    <div class="comment__author-line">
                        <span class="post__avatar" th:classappend="|post__avatar--${comment.avatarColor}|"></span>
                        <span class="comment__author" th:text="${comment.author}">投稿者</span>
                    </div>
                    <div class="comment__meta-actions">
                        <time class="comment__created-at"
                              th:datetime="${comment.createdAt}"
                              th:text="${@postTimeFormatter.format(comment.createdAt)}">たった今</time>
                        <form class="comment__delete-form"
                              th:action="@{/posts/{postId}/comments/{commentId}/delete(postId=${post.id},commentId=${comment.id})}"
                              method="post">
                            <button class="comment__delete-button" type="submit" aria-label="コメントを削除">🗑</button>
                        </form>
                    </div>
                </div>
                <p class="comment__body" th:text="${comment.body}">コメント本文</p>
            </article>
        </div>

    </section>

    <form class="post-form comment-form comment-form--detail"
          th:action="@{/posts/{id}/comments(id=${post.id})}"
          th:object="${commentForm}"
          method="post">
        <div class="post-form__field">
            <label for="author">投稿者名</label>
            <input type="text" id="author" th:field="*{author}" maxlength="30" required>
            <p class="error" th:if="${#fields.hasErrors('author')}" th:errors="*{author}">エラー</p>
        </div>
        <div class="post-form__field">
            <span class="post-form__label">アバター色</span>
            <div class="avatar-color-picker">
                <label class="avatar-color-picker__option" th:each="avatarColor : ${avatarColors}">
                    <input class="avatar-color-picker__input"
                           type="radio"
                           th:field="*{avatarColor}"
                           th:value="${avatarColor.value}">
                    <span class="avatar-color-picker__swatch"
                          th:classappend="|avatar-color-picker__swatch--${avatarColor.value}|"></span>
                    <span class="avatar-color-picker__label" th:text="${avatarColor.label}">青</span>
                </label>
            </div>
        </div>
        <div class="post-form__field">
            <label for="body">コメント本文 (280 文字まで)</label>
            <textarea id="body" th:field="*{body}" maxlength="280" rows="3" required></textarea>
            <p class="error" th:if="${#fields.hasErrors('body')}" th:errors="*{body}">エラー</p>
        </div>
        <div class="post-form__actions">
            <button class="post-form__submit" type="submit">コメント</button>
        </div>
    </form>
</main>
</body>
</html>
