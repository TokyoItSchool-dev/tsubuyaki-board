<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投稿一覧 - 社内つぶやきボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main>
    <header class="page-header">
        <div>
            <h1>社内つぶやきボード</h1>
            <p class="page-header__subtitle">投稿一覧</p>
        </div>
        <form th:action="@{/posts/}" method="get">
            <button type="submit">更新</button>
        </form>
    </header>

    <nav>
        <a th:href="@{/posts}">一覧</a>
        |
        <a th:href="@{/posts/new}">新規投稿</a>
    </nav>

    <section class="post-list" aria-label="投稿一覧">
        <p class="empty-message" th:if="${#lists.isEmpty(posts)}">まだ投稿はありません</p>

        <article class="post" style="display: none;" th:each="post : ${posts}" th:style="''">
            <div class="post__author">
                <span class="post__label">投稿者</span>
                <span th:text="${post.author}">投稿者</span>
            </div>
            <p class="post__body" th:text="${post.body}">本文</p>
            <div class="post__created-at">
                <span class="post__label">投稿日</span>
                <time th:datetime="${post.createdAt}"
                      th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-23 09:00</time>
            </div>
        </article>
    </section>
</main>
</body>
</html>
